kind = "web"
previewPath = "/"
title = "Web Design Business Site"
version = "1.0.0"
id = "artifacts/web-design-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25844

[services.development]
run = "pnpm --filter @workspace/web-design-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/web-design-site", "run", "build" ]
publicDir = "artifacts/web-design-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25844"
BASE_PATH = "/"
