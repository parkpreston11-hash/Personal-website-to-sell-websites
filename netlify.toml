[build]
  base    = "."
  command = "pnpm install && pnpm --filter @workspace/web-design-site run build:netlify"
  publish = "artifacts/web-design-site/dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
