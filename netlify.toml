[build]
  base    = "."
  command = "pnpm install && pnpm --filter @workspace/web-design-site run build:netlify"
  publish = "artifacts/web-design-site/dist"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10"

[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

# SPA routing — all paths serve index.html so React Router handles them
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options      = "DENY"
    X-Content-Type-Options = "nosniff"
